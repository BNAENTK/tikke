<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Tikke Translation Overlay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: transparent !important; overflow: hidden; width: 100vw; height: 100vh; }
    #container {
      position: fixed;
      bottom: 5vh; left: 4vw; right: 4vw;
      display: flex; justify-content: center;
      pointer-events: none;
    }
    #subtitle-wrap {
      display: flex; flex-direction: column; gap: 8px;
      padding: 14px 22px;
      background: rgba(0,0,0,0.50);
      border-radius: 10px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      max-width: 92vw;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    #subtitle-wrap.visible { opacity: 1; transform: translateY(0); }
    .line {
      font-weight: 700; line-height: 1.4;
      font-family: -apple-system, "Noto Sans KR", "Malgun Gothic", sans-serif;
    }
    .line[hidden] { display: none !important; }
  </style>
</head>
<body>
  <div id="container">
    <div id="subtitle-wrap">
      <div class="line" id="line-ko"></div>
      <div class="line" id="line-en"></div>
      <div class="line" id="line-ja"></div>
      <div class="line" id="line-zhCN"></div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const room = params.get('room') || '';
    const defaultDuration = parseInt(params.get('duration') || '10000', 10);
    const WORKER = 'wss://tikke-worker.logoros11.workers.dev';

    const FLAGS = { ko: '🇰🇷', en: '🇺🇸', ja: '🇯🇵', 'zh-CN': '🇨🇳' };
    const LINE_IDS = { ko: 'line-ko', en: 'line-en', ja: 'line-ja', 'zh-CN': 'line-zhCN' };

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function applyStyle(el, style, lang) {
      const sz = style.fontSizes?.[lang] ?? 24;
      const color = style.colors?.[lang] ?? '#fff';
      const blur = style.shadowBlur ?? 6;
      const sc = style.shadowColor ?? '#000';
      el.style.fontSize = sz + 'px';
      el.style.color = color;
      el.style.textShadow = blur > 0 ? `0 0 ${blur}px ${sc}, 1px 1px ${Math.ceil(blur/2)}px ${sc}` : 'none';
      el.style.webkitTextStroke = (style.strokeWidth > 0) ? `${style.strokeWidth}px ${sc}` : '';
      el.style.letterSpacing = (lang === 'ja' || lang === 'zh-CN') ? '0.04em' : 'normal';
    }

    let hideTimer = null;

    const DEFAULT_STYLE = {
      showOriginal: true,
      enabledLangs: { en: true, ja: true, 'zh-CN': true },
      fontSizes: { ko: 28, en: 24, ja: 22, 'zh-CN': 22 },
      colors: { ko: '#FFFFFF', en: '#A7F3D0', ja: '#BAE6FD', 'zh-CN': '#FDE68A' },
      strokeWidth: 2, shadowBlur: 6, shadowColor: '#000',
      bgOpacity: 50,
      displayTimeoutMs: defaultDuration,
    };

    function applyBgOpacity(s) {
      const wrap = document.getElementById('subtitle-wrap');
      const alpha = (s.bgOpacity ?? 50) / 100;
      wrap.style.background = `rgba(0,0,0,${alpha})`;
    }

    function render(payload) {
      const subtitle = payload.subtitle ?? payload;
      const style = payload.style ? { ...DEFAULT_STYLE, ...payload.style } : DEFAULT_STYLE;
      const wrap = document.getElementById('subtitle-wrap');
      const timeout = style.displayTimeoutMs ?? defaultDuration;

      const koEl = document.getElementById('line-ko');
      if (style.showOriginal && subtitle.original) {
        koEl.innerHTML = `<span style="font-size:0.65em;opacity:0.7">${FLAGS.ko}</span> ${esc(subtitle.original)}`;
        applyStyle(koEl, style, 'ko');
        koEl.hidden = false;
      } else {
        koEl.hidden = true;
      }

      for (const lang of ['en', 'ja', 'zh-CN']) {
        const el = document.getElementById(LINE_IDS[lang]);
        const text = subtitle.translations?.[lang];
        if (text) {
          el.innerHTML = `<span style="font-size:0.65em;opacity:0.7">${FLAGS[lang]}</span> ${esc(text)}`;
          applyStyle(el, style, lang);
          el.hidden = false;
        } else {
          el.hidden = true;
        }
      }

      applyBgOpacity(style);
      wrap.classList.add('visible');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => wrap.classList.remove('visible'), timeout);
    }

    function handleEvent(ev) {
      if (ev.type === 'translation' && ev.payload) render(ev.payload);
      else if (ev.type === 'clear') { document.getElementById('subtitle-wrap').classList.remove('visible'); clearTimeout(hideTimer); }
    }

    let pingTimer;
    function connect() {
      if (!room) return;
      const ws = new WebSocket(`${WORKER}/overlay/rooms/${room}/ws`);
      ws.onopen = () => { clearInterval(pingTimer); pingTimer = setInterval(() => { if (ws.readyState === 1) ws.send('{"type":"ping"}'); }, 25000); };
      ws.onmessage = e => { try { const d = JSON.parse(e.data); if (d.type === 'events') d.events.forEach(handleEvent); } catch {} };
      ws.onclose = () => { clearInterval(pingTimer); setTimeout(connect, 3000); };
      ws.onerror = () => ws.close();
    }
    connect();
  </script>
</body>
</html>
