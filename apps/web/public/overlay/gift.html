<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>Tikke Gift Overlay</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;overflow:hidden;width:100%;height:100%;font-family:'Segoe UI',sans-serif}
#gifts{position:fixed;top:20px;right:20px;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.gift{display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(0,0,0,0.65);border:1px solid rgba(255,210,0,0.4);border-radius:12px;backdrop-filter:blur(6px);animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
.gift.fade-out{animation:fadeOut .4s ease forwards}
@keyframes popIn{from{opacity:0;transform:scale(.6) translateX(40px)}to{opacity:1;transform:scale(1) translateX(0)}}
@keyframes fadeOut{to{opacity:0;transform:translateX(40px)}}
.gift-icon{font-size:28px}
.gift-info{}
.gift-nick{font-size:11px;color:#aaa;margin-bottom:2px}
.gift-name{font-size:14px;font-weight:700;color:#ffd200}
.gift-count{font-size:11px;color:#ff9500;margin-top:1px}
</style>
</head>
<body>
<div id="gifts"></div>
<script>
const params=new URLSearchParams(location.search);
const room=params.get('room')||'';
const timeoutMs=parseInt(params.get('timeout')||'5000',10);
const WORKER='wss://tikke-worker.logoros11.workers.dev';

let ws;
function connect(){
  if(!room)return;
  ws=new WebSocket(`${WORKER}/overlay/rooms/${room}/ws`);
  ws.onmessage=e=>{
    try{const d=JSON.parse(e.data);if(d.type==='events')d.events.forEach(handleEvent)}catch{}
  };
  ws.onclose=()=>setTimeout(connect,3000);
}

function handleEvent(ev){
  if(ev.type!=='gift')return;
  const nick=ev.user?.nickname||ev.user?.uniqueId||'익명';
  const name=ev.giftName||'선물';
  const count=ev.repeatCount||1;
  showGift(nick,name,count);
}

function showGift(nick,name,count){
  const el=document.createElement('div');
  el.className='gift';
  el.innerHTML=`<div class="gift-icon">🎁</div><div class="gift-info"><div class="gift-nick">${esc(nick)}</div><div class="gift-name">${esc(name)}</div>${count>1?`<div class="gift-count">×${count}</div>`:''}</div>`;
  document.getElementById('gifts').appendChild(el);
  setTimeout(()=>{el.classList.add('fade-out');setTimeout(()=>el.remove(),400)},timeoutMs);
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
connect();
</script>
</body>
</html>
