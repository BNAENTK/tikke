<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Tikke Video Overlay</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: transparent !important;
  overflow: hidden;
}
#media-wrap {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
#media-wrap.hidden { display: none; }
video, img {
  max-width: 80%;
  max-height: 80%;
  border-radius: 12px;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  animation: popIn 0.3s ease;
}
.fade-out { animation: fadeOut 0.4s ease forwards !important; }
@keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
@keyframes fadeOut { to { opacity: 0; transform: scale(0.8); } }
</style>
</head>
<body>
<div id="media-wrap" class="hidden"></div>
<script>
const params = new URLSearchParams(location.search);
const room = params.get('room') || '';
const WORKER = 'wss://tikke-worker.logoros11.workers.dev';

const wrap = document.getElementById('media-wrap');
let hideTimer = null;

function clear() {
  if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
  const el = wrap.querySelector('video, img');
  if (el) {
    el.classList.add('fade-out');
    setTimeout(() => { wrap.innerHTML = ''; wrap.classList.add('hidden'); }, 400);
  } else {
    wrap.innerHTML = '';
    wrap.classList.add('hidden');
  }
}

function showVideo(url, durationMs) {
  clear();
  const video = document.createElement('video');
  video.src = url;
  video.autoplay = true;
  video.muted = false;
  video.controls = false;
  video.loop = false;
  video.addEventListener('ended', () => clear());
  video.addEventListener('error', () => clear());
  wrap.appendChild(video);
  wrap.classList.remove('hidden');
  if (durationMs) hideTimer = setTimeout(clear, durationMs);
}

function showImage(url, durationMs) {
  clear();
  const img = document.createElement('img');
  img.src = url;
  img.alt = '';
  wrap.appendChild(img);
  wrap.classList.remove('hidden');
  if (durationMs) hideTimer = setTimeout(clear, durationMs || 5000);
}

function handleEvent(ev) {
  if (ev.type === 'video' && ev.url) {
    showVideo(ev.url, ev.durationMs || 0);
  } else if (ev.type === 'image' && ev.url) {
    showImage(ev.url, ev.durationMs || 5000);
  } else if (ev.type === 'clear') {
    clear();
  }
}

function connect() {
  if (!room) return;
  const ws = new WebSocket(`${WORKER}/overlay/rooms/${room}/ws`);
  ws.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'events') d.events.forEach(handleEvent);
    } catch {}
  };
  ws.onclose = () => setTimeout(connect, 3000);
  ws.onerror = () => ws.close();
}
connect();
</script>
</body>
</html>
