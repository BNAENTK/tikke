<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>Tikke Marquee Overlay</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;overflow:hidden;width:100%;height:100%;font-family:'Segoe UI',sans-serif}
#marquee-wrap{position:fixed;bottom:0;left:0;right:0;overflow:hidden;height:48px;display:flex;align-items:center}
#marquee-track{display:flex;white-space:nowrap;will-change:transform}
.marquee-item{font-size:20px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8);padding:0 60px}
</style>
</head>
<body>
<div id="marquee-wrap"><div id="marquee-track"></div></div>
<script>
const params=new URLSearchParams(location.search);
const room=params.get('room')||'';
const speed=parseInt(params.get('speed')||'80',10);
const defaultDuration=parseInt(params.get('duration')||'8000',10);
const WORKER='wss://tikke-worker.logoros11.workers.dev';

const track=document.getElementById('marquee-track');
let anim,texts=[],pos=0;

let pingTimer;
function connect(){
  if(!room)return;
  const ws=new WebSocket(`${WORKER}/overlay/rooms/${room}/ws`);
  ws.onopen=()=>{clearInterval(pingTimer);pingTimer=setInterval(()=>{if(ws.readyState===1)ws.send('{"type":"ping"}')},25000);};
  ws.onmessage=e=>{
    try{const d=JSON.parse(e.data);if(d.type==='events')d.events.forEach(handleEvent)}catch{}
  };
  ws.onclose=()=>{clearInterval(pingTimer);setTimeout(connect,3000)};
  ws.onerror=()=>ws.close();
}

function handleEvent(ev){
  if(ev.type==='marquee'&&ev.text){addText(ev.text,ev.durationMs)}
  else if(ev.type==='chat'){addText(`${ev.user?.nickname||'익명'}: ${ev.message||''}`)}
}

let hideTimer=null;
function addText(t,dur){
  texts.push(esc(t));
  if(hideTimer){clearTimeout(hideTimer);hideTimer=null;}
  const d=dur||defaultDuration;
  if(d>0)hideTimer=setTimeout(()=>{texts=[];track.innerHTML='';if(anim){anim.cancel();anim=null;}hideTimer=null;},d);
  render();
}

function render(){
  track.innerHTML=texts.map(t=>`<span class="marquee-item">${t}</span>`).join('');
  if(anim)anim.cancel();
  const w=track.scrollWidth;
  anim=track.animate([{transform:'translateX(100vw)'},{transform:`translateX(-${w}px)`}],{duration:(w+window.innerWidth)/speed*1000,easing:'linear'});
  anim.onfinish=()=>{if(!hideTimer){texts=[];track.innerHTML='';anim=null;}};
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
connect();
</script>
</body>
</html>
