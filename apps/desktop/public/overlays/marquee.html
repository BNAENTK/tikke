<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Tikke Marquee Overlay</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: transparent !important; overflow: hidden; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
#marquee-wrap { position: fixed; bottom: 0; left: 0; right: 0; height: 52px; display: flex; align-items: center; overflow: hidden; background: rgba(0,0,0,0.82); border-top: 2px solid #00F2EA; }
#marquee-wrap.hidden { display: none; }
#marquee-track { display: inline-flex; align-items: center; white-space: nowrap; will-change: transform; }
.marquee-text { font-size: 22px; font-weight: 700; color: #fff; padding: 0 60px; text-shadow: 0 0 10px rgba(0,242,234,0.5); }
#status { position: fixed; top: 8px; right: 8px; width: 8px; height: 8px; border-radius: 50%; background: #555; transition: background 0.3s; }
#status.on { background: #34D399; box-shadow: 0 0 6px #34D399; }
</style>
</head>
<body>
<div id="status"></div>
<div id="marquee-wrap" class="hidden">
  <div id="marquee-track">
    <div id="marquee-text" class="marquee-text"></div>
    <div id="marquee-text2" class="marquee-text"></div>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
const defaultDuration = parseInt(params.get('duration') || '8000', 10);
const wrap = document.getElementById('marquee-wrap');
const track = document.getElementById('marquee-track');
const text1 = document.getElementById('marquee-text');
const text2 = document.getElementById('marquee-text2');
const statusDot = document.getElementById('status');
let animFrame = null, hideTimer = null, startX = 0, speed = 1.5;

function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function startMarquee(text, durationMs) {
  if (animFrame) cancelAnimationFrame(animFrame);
  if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
  const safe = esc(text);
  text1.innerHTML = safe; text2.innerHTML = safe;
  wrap.classList.remove('hidden');
  const trackWidth = text1.offsetWidth + 120;
  startX = wrap.offsetWidth || window.innerWidth;
  track.style.transform = `translateX(${startX}px)`;
  function step() {
    startX -= speed;
    track.style.transform = `translateX(${startX}px)`;
    if (startX < -trackWidth) startX = wrap.offsetWidth || window.innerWidth;
    animFrame = requestAnimationFrame(step);
  }
  animFrame = requestAnimationFrame(step);
  const d = durationMs > 0 ? durationMs : defaultDuration;
  if (d > 0) {
    hideTimer = setTimeout(() => {
      if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
      wrap.classList.add('hidden');
      hideTimer = null;
    }, d);
  }
}

function handleMessage(msg) {
  if (msg.type === 'marquee' && msg.text) {
    startMarquee(msg.text, msg.durationMs || defaultDuration);
  } else if (msg.type === 'clear') {
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
    wrap.classList.add('hidden');
  }
}

let ws, retryTimer;
function connect() {
  clearTimeout(retryTimer);
  ws = new WebSocket(`ws://${window.location.hostname}:18182`);
  ws.onopen = () => statusDot.classList.add('on');
  ws.onmessage = e => { try { handleMessage(JSON.parse(e.data)); } catch {} };
  ws.onclose = () => { statusDot.classList.remove('on'); retryTimer = setTimeout(connect, 2000); };
  ws.onerror = () => ws.close();
}
connect();
</script>
</body>
</html>
