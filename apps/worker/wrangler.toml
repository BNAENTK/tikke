name = "tikke-worker"
main = "src/index.ts"
compatibility_date = "2024-04-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for user settings (create with: wrangler kv namespace create TIKKE_SETTINGS)
[[kv_namespaces]]
binding = "TIKKE_SETTINGS"
id = "2157131587074eafbade50f7ce12f8af"
preview_id = "c4a7022104614e5a8068ba542a0ba60f"

# Durable Objects for stateful WebSocket overlay rooms
[[durable_objects.bindings]]
name = "TIKKE_OVERLAY"
class_name = "OverlayRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["OverlayRoom"]

# Environment variables (set secrets with: wrangler secret put SUPABASE_URL)
[vars]
TIKKE_APP_VERSION = "0.1.0"

# Development: set these in .dev.vars (do not commit)
# SUPABASE_URL = "https://xxx.supabase.co"
# SUPABASE_ANON_KEY = "..."
# SUPABASE_SERVICE_ROLE_KEY = "..."
